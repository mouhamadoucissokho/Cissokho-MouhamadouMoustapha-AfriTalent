<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfriTalent — Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">AfriTalent</a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMenu"
        aria-controls="navMenu"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="freelances.html">Freelances</a></li>
          <li class="nav-item"><a class="nav-link" href="tarifs.html">Tarifs</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">À propos</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <section id="contact">
      <div class="container py-5">
        <h1 class="text-center mb-5">Contactez-nous</h1>
        <div class="row">

          <!-- FORMULAIRE -->
          <div class="col-md-7">
            <div id="message-succes" class="alert alert-success d-none">
              ✅ Votre message a bien été envoyé ! Nous vous répondrons sous 24h.
            </div>
            <div id="formulaire-contact">
              <div class="mb-3">
                <label for="nom" class="form-label">Nom</label>
                <input type="text" class="form-control" id="nom" placeholder="Votre nom">
                <div class="text-danger" id="erreur-nom"></div>
              </div>
              <div class="mb-3">
                <label for="prenom" class="form-label">Prénom</label>
                <input type="text" class="form-control" id="prenom" placeholder="Votre prénom">
                <div class="text-danger" id="erreur-prenom"></div>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="votre@email.com">
                <div class="text-danger" id="erreur-email"></div>
              </div>
              <div class="mb-3">
                <label for="sujet" class="form-label">Sujet</label>
                <select class="form-select" id="sujet">
                  <option value="">-- Choisissez un sujet --</option>
                  <option value="info">Demande d'information</option>
                  <option value="support">Support technique</option>
                  <option value="partenariat">Partenariat</option>
                  <option value="autre">Autre</option>
                </select>
                <div class="text-danger" id="erreur-sujet"></div>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Votre message (minimum 20 caractères)"></textarea>
                <div class="text-danger" id="erreur-message"></div>
              </div>
              <button type="button" class="btn btn-primary" id="btn-envoyer">Envoyer</button>
            </div>
          </div>

          <!-- INFOS CONTACT -->
          <div class="col-md-5">
            <h4>Nos coordonnées</h4>
            <p>📧 contact@afritalent.com</p>
            <p>📞 +221 77 000 00 00</p>
            <p>📍 Dakar, Sénégal</p>
            <h4 class="mt-4">Localisation</h4>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d124154.32!2d-17.4676!3d14.7167!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xec172f5b3c5bb71%3A0xb3d3b934c6b06c5b!2sDakar%2C%20S%C3%A9n%C3%A9gal!5e0!3m2!1sfr!2sfr"
              width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
          </div>

        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-white py-4">
    <div class="container">
      <p class="text-center">&copy; <span id="annee"></span> AfriTalent. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
